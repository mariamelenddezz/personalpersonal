<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hábitos">
<meta name="theme-color" content="#1a1a1a">
<title>Tracker de Hábitos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #faf8f3;
    --paper2: #f2efe6;
    --accent: #c8502a;
    --accent2: #2a6b5a;
    --line: #d4cfc2;
    --soft: #e8e3d8;
    --muted: #8a857a;
    --done: #2a6b5a;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  html { 
    height: 100%; 
    overflow-x: hidden;
    overscroll-behavior-y: none;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding-top: var(--safe-top);
    padding-bottom: calc(var(--safe-bottom) + 80px);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
  }

  /* Header compacto */
  .screen-header {
    background: var(--ink);
    color: var(--paper);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .screen-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .header-controls {
    display: flex;
    gap: 4px;
    align-items: center;
    flex-shrink: 0;
  }
  .nav-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--paper);
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.02em;
    transition: all 0.15s;
    min-width: 36px;
    touch-action: manipulation;
    line-height: 1;
  }
  .nav-btn:active { 
    background: rgba(255,255,255,0.2); 
    transform: scale(0.92);
  }
  .nav-btn.accent { 
    background: var(--accent); 
    border-color: var(--accent);
    font-weight: 500;
    padding: 6px 12px;
  }
  .month-label {
    font-family: 'DM Serif Display', serif;
    font-size: 0.85rem;
    color: var(--paper);
    padding: 0 2px;
    min-width: 90px;
    text-align: center;
  }

  .page {
    max-width: 100%;
    margin: 0 auto;
    padding: 12px 10px 20px;
  }

  .month-title {
    text-align: center;
    margin-bottom: 16px;
    padding: 0 8px;
  }
  .month-title h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    letter-spacing: -0.01em;
    color: var(--ink);
    line-height: 1.2;
  }
  .month-title .year-tag {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* OBJETIVOS - Versión compacta para móvil */
  .objectives-section {
    margin-bottom: 16px;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    background: var(--paper);
    box-shadow: 0 1px 4px rgba(0,0,0,0.03);
  }
  .objectives-header {
    background: var(--ink);
    color: var(--paper);
    padding: 10px 12px;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .objectives-list {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--paper2);
    max-height: 200px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .objective-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px;
    background: var(--paper);
    border-radius: 6px;
    border: 1px solid var(--line);
  }
  .obj-number {
    font-size: 0.6rem;
    font-weight: 500;
    color: var(--muted);
    min-width: 18px;
    letter-spacing: 0.03em;
  }
  .obj-color-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .obj-name {
    flex: 1;
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    border: none;
    background: transparent;
    outline: none;
    color: var(--ink);
    min-width: 60px;
    padding: 4px;
    border-radius: 4px;
  }
  .obj-name:focus {
    background: var(--soft);
  }
  .obj-name::placeholder { color: var(--line); }
  .obj-days {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }
  .day-toggle {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: var(--paper2);
    font-size: 0.6rem;
    font-family: 'DM Mono', monospace;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    text-align: center;
    line-height: 22px;
    padding: 0;
    transition: all 0.1s;
  }
  .day-toggle:active {
    transform: scale(0.9);
  }
  .day-toggle.active {
    color: white;
    border-color: transparent;
    font-weight: 700;
  }
  .remove-obj {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--line);
    font-size: 1.2rem;
    padding: 2px 6px;
    line-height: 1;
    transition: color 0.12s;
    margin-left: 2px;
  }
  .remove-obj:active { color: var(--accent); }
  .add-obj-btn {
    margin: 8px;
    background: transparent;
    border: 1.5px dashed var(--line);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    width: calc(100% - 16px);
  }
  .add-obj-btn:active { 
    border-color: var(--ink); 
    color: var(--ink);
    background: var(--soft);
  }

  /* CALENDARIO LINEAL - Optimizado para scroll horizontal en móvil */
  .calendar-wrapper {
    overflow-x: auto;
    overflow-y: hidden;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--paper);
    box-shadow: 0 1px 4px rgba(0,0,0,0.03);
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  
  .calendar-wrapper::-webkit-scrollbar {
    height: 6px;
  }
  .calendar-wrapper::-webkit-scrollbar-track {
    background: var(--paper2);
  }
  .calendar-wrapper::-webkit-scrollbar-thumb {
    background: var(--line);
    border-radius: 3px;
  }

  table.calendar {
    width: auto;
    min-width: 100%;
    border-collapse: collapse;
    font-size: 0.7rem;
    table-layout: fixed;
  }

  /* Header de días fijo al hacer scroll */
  .calendar thead {
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .calendar thead tr:first-child th {
    background: var(--ink);
    color: var(--paper);
    padding: 8px 2px;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.1);
    min-width: 32px;
    width: 32px;
    position: relative;
  }

  .calendar thead tr:first-child th:first-child {
    text-align: left;
    padding-left: 10px;
    min-width: 100px;
    width: 100px;
    position: sticky;
    left: 0;
    z-index: 20;
    background: var(--ink);
  }

  .cal-day-header { 
    min-width: 32px; 
    width: 32px;
    font-size: 0.55rem;
  }

  tr.day-numbers th {
    background: var(--paper2);
    color: var(--muted);
    padding: 4px 2px;
    font-size: 0.6rem;
    text-align: center;
    border-right: 1px solid var(--soft);
    border-bottom: 1px solid var(--line);
    font-weight: 500;
    min-width: 32px;
    width: 32px;
  }

  tr.day-numbers th:first-child {
    text-align: left;
    padding-left: 10px;
    font-size: 0.55rem;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    min-width: 100px;
    width: 100px;
    position: sticky;
    left: 0;
    z-index: 15;
    background: var(--paper2);
  }

  tr.day-numbers th.today-head-num { 
    color: var(--accent); 
    font-weight: 700;
    background: rgba(200, 80, 42, 0.08);
  }
  tr.day-numbers th.weekend-num { color: var(--accent2); }

  .calendar tbody tr { 
    border-bottom: 1px solid var(--line); 
    transition: background 0.1s; 
  }
  .calendar tbody tr:last-child { border-bottom: none; }
  .calendar tbody tr:active { background: rgba(0,0,0,0.02); }

  .calendar tbody td {
    padding: 4px 2px;
    text-align: center;
    border-right: 1px solid var(--soft);
    vertical-align: middle;
    min-width: 32px;
    width: 32px;
  }

  .calendar tbody td:first-child {
    padding: 0;
    min-width: 100px;
    width: 100px;
    position: sticky;
    left: 0;
    z-index: 5;
    background: var(--paper);
    border-right: 1px solid var(--line);
  }

  .obj-row-label {
    padding: 6px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--paper2);
    height: 100%;
  }
  .obj-row-dot { 
    width: 6px; 
    height: 6px; 
    border-radius: 50%; 
    flex-shrink: 0; 
  }
  .obj-row-name {
    font-size: 0.7rem;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px;
    font-weight: 500;
  }

  .cal-cell {
    padding: 2px;
  }
  .cal-cell:last-child { border-right: none; }
  .cal-cell.inactive { 
    background: var(--soft); 
    opacity: 0.4; 
  }
  .cal-cell.inactive > div {
    width: 20px;
    height: 20px;
    margin: auto;
    background: var(--line);
    border-radius: 3px;
    opacity: 0.5;
  }

  .check-box {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    border: 1.5px solid var(--line);
    background: white;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: transparent;
    transition: all 0.12s;
    user-select: none;
    margin: auto;
    touch-action: manipulation;
  }
  .check-box:active { 
    border-color: var(--muted);
    transform: scale(0.9);
  }
  .check-box.checked { 
    border-color: transparent; 
    color: white;
  }

  .today-col { 
    background: rgba(200, 80, 42, 0.06); 
  }
  .today-head { 
    background: var(--accent) !important; 
    color: white !important; 
  }

  /* Barra de progreso inferior fija */
  .progress-container {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(250, 248, 243, 0.98);
    border-top: 1px solid var(--line);
    padding: 10px 12px calc(10px + var(--safe-bottom));
    z-index: 90;
    backdrop-filter: blur(20px);
    max-height: 35vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .progress-header {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    font-weight: 500;
  }
  .progress-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .progress-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }
  .progress-dot { 
    width: 6px; 
    height: 6px; 
    border-radius: 50%; 
    flex-shrink: 0; 
  }
  .progress-label { 
    font-size: 0.75rem; 
    color: var(--ink); 
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }
  .progress-bar-wrap { 
    width: 50px; 
    height: 4px; 
    background: var(--soft); 
    border-radius: 2px; 
    overflow: hidden; 
    flex-shrink: 0;
  }
  .progress-bar-fill { 
    height: 100%; 
    border-radius: 2px; 
    transition: width 0.3s ease; 
  }
  .progress-pct { 
    font-size: 0.7rem; 
    font-weight: 600; 
    min-width: 28px; 
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .legend {
    margin-top: 12px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.03em;
    padding: 0 4px;
  }
  .legend-item { 
    display: flex; 
    align-items: center; 
    gap: 4px; 
  }
  .legend-box { 
    width: 12px; 
    height: 12px; 
    border-radius: 2px; 
    border: 1.5px solid var(--line); 
    display: inline-block; 
  }
  .legend-box.done-box { 
    background: var(--done); 
    border-color: var(--done); 
  }
  .legend-box.skip-box { 
    background: var(--soft); 
    border-color: var(--line); 
  }

  /* Indicador de guardado */
  .save-indicator {
    position: fixed;
    top: 50px;
    right: 12px;
    background: var(--accent2);
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 200;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .save-indicator.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Modal de confirmación */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal-content {
    background: var(--paper);
    border-radius: 14px;
    padding: 24px;
    max-width: 280px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    margin-bottom: 12px;
    color: var(--ink);
  }
  .modal-text {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .modal-buttons {
    display: flex;
    gap: 10px;
  }
  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .modal-btn.cancel {
    background: var(--soft);
    color: var(--ink);
  }
  .modal-btn.confirm {
    background: var(--accent);
    color: white;
  }
  .modal-btn:active {
    transform: scale(0.95);
    opacity: 0.8;
  }

  /* Espaciado inferior para la barra fija */
  .bottom-spacer {
    height: 180px;
  }

  /* Ajustes específicos para pantallas muy pequeñas (iPhone SE) */
  @media (max-width: 375px) {
    .screen-header h1 { font-size: 0.9rem; }
    .month-title h2 { font-size: 1.4rem; }
    .nav-btn { padding: 5px 8px; font-size: 0.7rem; min-width: 32px; }
    .month-label { font-size: 0.8rem; min-width: 80px; }
    .obj-name { font-size: 0.75rem; }
    .day-toggle { width: 22px; height: 22px; font-size: 0.55rem; }
    .calendar thead tr:first-child th:first-child,
    tr.day-numbers th:first-child,
    .calendar tbody td:first-child {
      min-width: 90px;
      width: 90px;
    }
    .obj-row-name { max-width: 70px; font-size: 0.65rem; }
    .check-box { width: 22px; height: 22px; }
    .cal-day-header, tr.day-numbers th, .calendar tbody td {
      min-width: 30px;
      width: 30px;
    }
  }

  /* Para pantallas más grandes (iPhone Plus/Pro Max) */
  @media (min-width: 400px) {
    .calendar thead tr:first-child th:first-child,
    tr.day-numbers th:first-child,
    .calendar tbody td:first-child {
      min-width: 120px;
      width: 120px;
    }
    .obj-row-name { max-width: 100px; }
    .cal-day-header, tr.day-numbers th, .calendar tbody td {
      min-width: 36px;
      width: 36px;
    }
  }
</style>
</head>
<body>

<div class="save-indicator" id="save-indicator">💾 Guardado</div>

<div class="screen-header">
  <h1>📅 Tracker Lineal</h1>
  <div class="header-controls">
    <button class="nav-btn" onclick="prevMonth()">◀</button>
    <span class="month-label" id="header-month-label"></span>
    <button class="nav-btn" onclick="nextMonth()">▶</button>
    <button class="nav-btn" onclick="exportData()" title="Exportar">⬆</button>
  </div>
</div>

<div class="page">
  <div class="month-title">
    <h2 id="month-display"></h2>
    <div class="year-tag" id="year-display"></div>
  </div>

  <div class="objectives-section">
    <div class="objectives-header">
      <span>Mis Hábitos</span>
      <span style="font-size:0.55rem;opacity:0.7">Toca días activos</span>
    </div>
    <div class="objectives-list" id="objectives-list"></div>
    <button class="add-obj-btn" onclick="addObjective()">＋ Nuevo hábito</button>
  </div>

  <div class="calendar-wrapper" id="calendar-scroll">
    <table class="calendar" id="calendar-table"></table>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-box done-box"></div> Hecho</div>
    <div class="legend-item"><div class="legend-box"></div> Pendiente</div>
    <div class="legend-item"><div class="legend-box skip-box"></div> No aplica</div>
  </div>

  <div class="bottom-spacer"></div>
</div>

<div class="progress-container">
  <div class="progress-header">
    <span>Progreso del mes</span>
    <span id="overall-progress">0%</span>
  </div>
  <div class="progress-row" id="progress-row"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-content">
    <div class="modal-title" id="modal-title">¿Eliminar?</div>
    <div class="modal-text" id="modal-text">Esta acción no se puede deshacer.</div>
    <div class="modal-buttons">
      <button class="modal-btn cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn confirm" id="modal-confirm">Eliminar</button>
    </div>
  </div>
</div>

<script>
  const PALETTE = [
    '#c8502a','#2a6b5a','#4a5fa8','#a05ca0','#c89428','#2a8a9a',
    '#8a4030','#3a7a3a','#5a2a8a','#c05080','#6a8a28','#2a5a80'
  ];
  const DAY_LABELS = ['L','M','X','J','V','S','D'];
  const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const STORAGE_KEY = 'habit_tracker_linear_v1';

  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth();
  let today = new Date();
  let saveTimeout = null;

  let objectives = [
    { id: 1, name: 'Ejercicio', days: [1,2,3,4,5], color: PALETTE[0] },
    { id: 2, name: 'Leer', days: [0,1,2,3,4,5,6], color: PALETTE[1] },
    { id: 3, name: 'Meditar', days: [0,1,2,3,4,5,6], color: PALETTE[2] },
  ];
  let nextId = 4;
  let checks = {};

  // Persistencia
  function loadData() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const data = JSON.parse(saved);
        if (data.objectives) objectives = data.objectives;
        if (data.nextId) nextId = data.nextId;
        if (data.checks) checks = data.checks;
      }
    } catch (e) {
      console.error('Error cargando:', e);
    }
  }

  function saveData() {
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      try {
        const data = { objectives, nextId, checks, savedAt: new Date().toISOString() };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        showSaveIndicator();
      } catch (e) {
        alert('Error al guardar. Almacenamiento lleno.');
      }
    }, 300);
  }

  function showSaveIndicator() {
    const el = document.getElementById('save-indicator');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);
  }

  function monthKey() { return `${currentYear}_${currentMonth}`; }
  function getCheck(objId, day) { return checks[monthKey()]?.[objId]?.[day] || null; }
  function setCheck(objId, day, val) {
    const mk = monthKey();
    if (!checks[mk]) checks[mk] = {};
    if (!checks[mk][objId]) checks[mk][objId] = {};
    checks[mk][objId][day] = val;
    saveData();
  }

  function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
  function prevMonth() { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} render(); }
  function nextMonth() { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} render(); }

  function addObjective() {
    objectives.push({ 
      id: nextId++, 
      name: '', 
      days: [0,1,2,3,4,5,6], 
      color: PALETTE[objectives.length % PALETTE.length] 
    });
    saveData();
    render();
    setTimeout(() => {
      const inputs = document.querySelectorAll('.obj-name');
      if(inputs.length) inputs[inputs.length-1].focus();
    }, 50);
  }

  let deleteCallback = null;
  function confirmDelete(title, text, onConfirm) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    document.getElementById('modal').classList.add('show');
    deleteCallback = onConfirm;
    document.getElementById('modal-confirm').onclick = () => {
      closeModal();
      if (deleteCallback) deleteCallback();
    };
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
    deleteCallback = null;
  }

  function removeObjective(id) {
    const obj = objectives.find(o => o.id === id);
    confirmDelete(
      '¿Eliminar hábito?',
      `Se borrará "${obj?.name || 'este hábito'}" y su historial.`,
      () => {
        objectives = objectives.filter(o => o.id !== id);
        saveData();
        render();
      }
    );
  }

  function toggleDay(objId, dayIdx) {
    const obj = objectives.find(o => o.id === objId);
    if(!obj) return;
    const i = obj.days.indexOf(dayIdx);
    if(i >= 0) obj.days.splice(i, 1);
    else obj.days.push(dayIdx);
    saveData();
    render();
  }

  function updateName(objId, val) {
    const obj = objectives.find(o => o.id === objId);
    if(obj) {
      obj.name = val;
      saveData();
      renderCalendar();
      renderProgress();
    }
  }

  function cycleCheck(objId, day) {
    const cur = getCheck(objId, day);
    setCheck(objId, day, cur === 'done' ? null : 'done');
    renderCalendar();
    renderProgress();
  }

  function exportData() {
    const data = { objectives, nextId, checks, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `habitos-lineal-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function renderObjectives() {
    const list = document.getElementById('objectives-list');
    list.innerHTML = '';
    objectives.forEach((obj, idx) => {
      const row = document.createElement('div');
      row.className = 'objective-row';
      row.innerHTML = `
        <span class="obj-number">${idx + 1}</span>
        <div class="obj-color-dot" style="background:${obj.color}"></div>
        <input class="obj-name" placeholder="Nombre..." value="${escHtml(obj.name)}"
          oninput="updateName(${obj.id}, this.value)" />
        <div class="obj-days">
          ${DAY_LABELS.map((d, di) => `
            <button class="day-toggle ${obj.days.includes(di) ? 'active' : ''}" 
              style="${obj.days.includes(di) ? `background:${obj.color};` : ''}"
              onclick="toggleDay(${obj.id},${di})">${d}</button>
          `).join('')}
        </div>
        <button class="remove-obj" onclick="removeObjective(${obj.id})">×</button>
      `;
      list.appendChild(row);
    });
  }

  function renderCalendar() {
    const table = document.getElementById('calendar-table');
    const totalDays = daysInMonth(currentYear, currentMonth);
    const isThisMonth = (today.getFullYear() === currentYear && today.getMonth() === currentMonth);

    let html = '<thead>';
    
    // Fila de nombres de días
    html += '<tr>';
    html += `<th>Objetivo</th>`;
    for(let d = 1; d <= totalDays; d++) {
      const dow = (new Date(currentYear, currentMonth, d).getDay() + 6) % 7;
      const isToday = isThisMonth && d === today.getDate();
      const isWE = dow >= 5;
      const style = isToday ? 'background:var(--accent);color:white;' : (isWE ? 'color:#6ab0a0;' : '');
      html += `<th class="cal-day-header" style="${style}">${DAY_LABELS[dow]}</th>`;
    }
    html += '</tr>';

    // Fila de números
    html += '<tr class="day-numbers">';
    html += `<th></th>`;
    for(let d = 1; d <= totalDays; d++) {
      const isToday = isThisMonth && d === today.getDate();
      const dow = (new Date(currentYear, currentMonth, d).getDay() + 6) % 7;
      const cls = isToday ? 'today-head-num' : (dow >= 5 ? 'weekend-num' : '');
      html += `<th class="${cls}">${d}</th>`;
    }
    html += '</tr></thead><tbody>';

    // Filas de hábitos
    objectives.forEach(obj => {
      html += '<tr>';
      const label = obj.name || 'Hábito';
      html += `<td><div class="obj-row-label">
        <div class="obj-row-dot" style="background:${obj.color}"></div>
        <span class="obj-row-name" title="${escHtml(label)}">${escHtml(label)}</span>
      </div></td>`;
      
      for(let d = 1; d <= totalDays; d++) {
        const dow = (new Date(currentYear, currentMonth, d).getDay() + 6) % 7;
        const isActive = obj.days.includes(dow);
        const isToday = isThisMonth && d === today.getDate();
        const tdCls = `cal-cell${isToday ? ' today-col' : ''}`;
        
        if(!isActive) {
          html += `<td class="${tdCls} inactive"><div></div></td>`;
        } else {
          const state = getCheck(obj.id, d);
          const done = state === 'done';
          const checkStyle = done ? `background:${obj.color};border-color:${obj.color}` : '';
          html += `<td class="${tdCls}"><div class="check-box${done ? ' checked' : ''}" 
            style="${checkStyle}" onclick="cycleCheck(${obj.id},${d})">${done ? '✓' : ''}</div></td>`;
        }
      }
      html += '</tr>';
    });

    if(objectives.length === 0) {
      html += `<tr><td colspan="${totalDays + 1}" style="text-align:center;padding:20px;color:var(--muted);font-size:0.75rem">
        Añade hábitos arriba para comenzar
      </td></tr>`;
    }
    
    html += '</tbody>';
    table.innerHTML = html;

    // Auto-scroll al día actual si es este mes
    if(isThisMonth) {
      setTimeout(() => {
        const scrollContainer = document.getElementById('calendar-scroll');
        const todayCell = document.querySelector('.today-col');
        if(todayCell && scrollContainer) {
          const scrollPos = todayCell.offsetLeft - scrollContainer.offsetWidth / 2 + 20;
          scrollContainer.scrollTo({ left: Math.max(0, scrollPos), behavior: 'smooth' });
        }
      }, 100);
    }
  }

  function renderProgress() {
    const row = document.getElementById('progress-row');
    if(!objectives.length) { 
      row.innerHTML = '<div style="color:var(--muted);font-size:0.75rem;text-align:center;padding:8px">Añade hábitos para ver progreso</div>';
      document.getElementById('overall-progress').textContent = '0%';
      return; 
    }
    
    const totalDays = daysInMonth(currentYear, currentMonth);
    const isThisMonth = (today.getFullYear() === currentYear && today.getMonth() === currentMonth);
    const maxDay = isThisMonth ? today.getDate() : totalDays;

    let totalApplicable = 0, totalDone = 0;

    const itemsHtml = objectives.map(obj => {
      let applicable = 0, done = 0;
      for(let d = 1; d <= maxDay; d++) {
        const dow = (new Date(currentYear, currentMonth, d).getDay() + 6) % 7;
        if(obj.days.includes(dow)) {
          applicable++;
          if(getCheck(obj.id, d) === 'done') done++;
        }
      }
      totalApplicable += applicable;
      totalDone += done;
      
      const pct = applicable > 0 ? Math.round((done/applicable)*100) : 0;
      const name = obj.name || 'Hábito';
      return `<div class="progress-item">
        <div class="progress-dot" style="background:${obj.color}"></div>
        <span class="progress-label">${escHtml(name)}</span>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%;background:${obj.color}"></div>
        </div>
        <span class="progress-pct" style="color:${obj.color}">${pct}%</span>
      </div>`;
    }).join('');

    row.innerHTML = itemsHtml;
    
    const overallPct = totalApplicable > 0 ? Math.round((totalDone/totalApplicable)*100) : 0;
    document.getElementById('overall-progress').textContent = `${overallPct}% general`;
  }

  function renderHeader() {
    document.getElementById('month-display').textContent = MONTH_NAMES[currentMonth];
    document.getElementById('year-display').textContent = currentYear;
    document.getElementById('header-month-label').textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;
  }

  function render() {
    renderHeader();
    renderObjectives();
    renderCalendar();
    renderProgress();
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Inicializar
  loadData();
  render();

  // Guardar al salir
  window.addEventListener('beforeunload', () => {
    if (saveTimeout) clearTimeout(saveTimeout);
    saveData();
  });

  // Prevenir zoom en doble tap
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, false);
</script>
</body>
</html>
